<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      (function () {
        try {
          var KEY = 'usdt-theme-mode';
          var raw = localStorage.getItem(KEY);
          var mode = raw === 'light' || raw === 'dark' || raw === 'auto' ? raw : 'auto';
          var resolved =
            mode === 'dark'
              ? 'dark'
              : mode === 'light'
                ? 'light'
                : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                  ? 'dark'
                  : 'light';
          document.documentElement.dataset.theme = resolved;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <script>
      (function () {
        var root = document.documentElement;

        function applyViewportSize() {
          var viewport = window.visualViewport;
          var width = Math.max(Math.round((viewport && viewport.width) || window.innerWidth || 0), 320);
          var height = Math.max(Math.round((viewport && viewport.height) || window.innerHeight || 0), 320);

          root.style.setProperty('--app-vw', width + 'px');
          root.style.setProperty('--app-vh', height + 'px');
        }

        function recoverViewport() {
          applyViewportSize();
          window.requestAnimationFrame(function () {
            window.requestAnimationFrame(applyViewportSize);
          });
        }

        window.__refreshAppViewport = recoverViewport;

        applyViewportSize();

        window.addEventListener('resize', recoverViewport, { passive: true });
        window.addEventListener(
          'orientationchange',
          function () {
            window.setTimeout(recoverViewport, 80);
          },
          { passive: true }
        );
        window.addEventListener(
          'pageshow',
          function () {
            window.setTimeout(recoverViewport, 0);
          },
          { passive: true }
        );
        document.addEventListener(
          'focusin',
          function () {
            window.setTimeout(applyViewportSize, 32);
          },
          true
        );
        document.addEventListener(
          'focusout',
          function () {
            window.setTimeout(recoverViewport, 120);
          },
          true
        );

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', applyViewportSize, { passive: true });
          window.visualViewport.addEventListener('scroll', applyViewportSize, { passive: true });
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="description" content="نظام تشغيل يومي لإدارة الحوالات والتسويات والمدفوعات." />
    <meta name="application-name" content="EDUQUEST" />
    <meta name="theme-color" content="#11293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EDUQUEST" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icons/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/apple-touch-icon.svg" />
    <title>EDUQUEST</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
