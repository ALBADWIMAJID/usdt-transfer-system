<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      (function () {
        try {
          var KEY = 'usdt-theme-mode';
          var raw = localStorage.getItem(KEY);
          var mode = raw === 'light' || raw === 'dark' || raw === 'auto' ? raw : 'auto';
          var resolved =
            mode === 'dark'
              ? 'dark'
              : mode === 'light'
                ? 'light'
                : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                  ? 'dark'
                  : 'light';
          document.documentElement.dataset.theme = resolved;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="description" content="نظام تشغيل يومي لإدارة الحوالات والتسويات والمدفوعات." />
    <meta name="application-name" content="EDUQUEST" />
    <meta name="theme-color" content="#11293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EDUQUEST" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/eduquest-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <title>EDUQUEST</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
