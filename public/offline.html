<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#11293b" />
    <title>Velora</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --border: rgba(17, 41, 59, 0.08);
        --primary: #0d7a72;
        --secondary: #11293b;
        --muted: #5b7083;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background:
          radial-gradient(circle at top, rgba(13, 122, 114, 0.08), transparent 38%),
          var(--bg);
        color: var(--secondary);
      }

      .offline-shell {
        width: min(100%, 30rem);
        padding: 1.35rem;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
      }

      .brand {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .brand-mark {
        width: min(100%, 11rem);
        padding: 0.15rem 0.1rem;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(241, 246, 251, 0.92));
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
      }

      .brand-mark img {
        display: block;
        width: 100%;
        height: auto;
      }

      h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      p {
        margin: 0.35rem 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.25rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0.75rem 1rem;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 700;
      }

      .button-primary {
        background: var(--primary);
        color: #fff;
      }

      .button-secondary {
        border: 1px solid var(--border);
        color: var(--secondary);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="offline-shell">
      <div class="brand">
        <div class="brand-mark">
          <img src="./branding/velora-logo-light.svg" alt="Velora" />
        </div>
        <div>
          <h1>Velora</h1>
          <p>تم تحميل غلاف التطبيق مسبقا، لكن الاتصال مطلوب لجلب البيانات الحية.</p>
        </div>
      </div>

      <p>يمكنك إبقاء التطبيق مثبتا على الشاشة الرئيسية ثم إعادة المحاولة عند عودة الاتصال.</p>

      <div class="actions">
        <a class="button button-primary" href="./">فتح الغلاف المحفوظ</a>
        <a class="button button-secondary" href="javascript:location.reload()">إعادة المحاولة</a>
      </div>
    </main>
  </body>
</html>
